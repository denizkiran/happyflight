<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeatAura - Premium Airline Seat Advisor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* modern dark theme */
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #222222;
            --accent: #00e5ff;
            --accent2: #ff6b6b;
            --text: #e0e0e0;
            --text-muted: #777777;
            --border: #2a2a2a;
        }

        html,
        body {
            background: linear-gradient(135deg, var(--color-void) 0%, #0f0f0f 100%);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* professional sheen for interactive elements */
        button, select, input[type="range"], input[type="text"], input[type="number"] {
            transition: all 0.2s ease;
            border-radius: 0.25rem;
            font-weight: 500;
        }

        select:focus, input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(6,182,212,0.3);
        }

        input[type="range"] {
            appearance: none;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #06b6d4 50%, #444 50%);
            height: 6px;
            border-radius: 3px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #06b6d4;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(0,0,0,0.4);
        }

        button:hover, .filter-pill:hover {
            transform: translateY(-1px) scale(1.01);
            box-shadow: 0 2px 8px rgba(6,182,212,0.2);
        }

        .filter-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 0.4rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-pill.active {
            background: rgba(0,217,255,0.25);
            color: #00e5ff;
            border-color: #00e5ff;
        }

        /* smooth appearance for sections (see enhanced definitions later) */

        /* loading overlay styled */
        .loading-overlay {
            background: rgba(0,0,0,0.95);
        }

        .loading-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            letter-spacing: 0.2em;
            color: #00e5ff;
        }

        .flying-plane {
            color: #00e5ff;
            animation: flyingPlane 1s cubic-bezier(0.4,0,0.2,1) forwards;
        }

        /* seat buttons look like slick pills */
        .seat {
            background-clip: padding-box;
            box-shadow: 0 0 2px rgba(0,0,0,0.4);
            border-radius: 0.2rem;
        }

        /* transition for seat map rows */
        .seat-row {
            transition: opacity 0.2s ease;
        }

        /* ==================== HEADER STYLING ==================== */
        .header {
            border-bottom: 1px solid rgba(0, 217, 255, 0.1);
            padding: 2rem 1rem;
            backdrop-filter: blur(10px);
        }

        .header .logo {
            font-size: 2.4rem;
            letter-spacing: 0.15em;
        }

        .tagline {
            font-size: 1rem;
            color: #aaa;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: #888;
            font-size: 0.875rem;
            opacity: 0.8;
        }

        /* ==================== SEARCH SECTION ==================== */
        .search-section {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        /* ==================== AIRCRAFT SELECTOR ==================== */
        .aircraft-selector-container {
            margin-bottom: 2rem;
        }

        .selector-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            display: block;
        }

        .aircraft-select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: var(--color-surface);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        .aircraft-select:hover {
            border-color: rgba(0, 217, 255, 0.3);
            background: var(--color-surface-light);
        }

        .aircraft-select:focus {
            border-color: #06b6d4;
            background: var(--color-surface-light);
        }

        .aircraft-select option {
            background: #0a0a0a;
            color: white;
            padding: 0.5rem;
        }

        /* ==================== FILTER PILLS ==================== */
        .filters-section {
            margin-bottom: 2rem;
        }

        .filter-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: block;
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .filter-pill {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #aaa;
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-pill:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: #ddd;
        }

        .filter-pill.active {
            background: rgba(0, 217, 255, 0.15);
            border-color: #06b6d4;
            color: #06b6d4;
        }

        /* ==================== AIRCRAFT HEADER ==================== */
        .aircraft-header {
            max-width: 1200px;
            margin: 3rem auto 2rem;
            padding: 0 1rem;
        }

        .aircraft-name-display {
            text-align: center;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.08), rgba(0, 217, 255, 0.02));
            border: 1px solid rgba(0, 217, 255, 0.1);
            border-radius: 1rem;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* fancy page transition animations */
        .fade-in {
            /* rename semantic; will be used for sections entering view */
            animation: fancyIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .fade-out {
            animation: fancyOut 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fancyIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px) rotate(-2deg);
            }
            60% {
                opacity: 1;
                transform: scale(1.05) translateY(-10px) rotate(1deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0) rotate(0);
            }
        }

        @keyframes fancyOut {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(0.8) translateY(-20px) rotate(-3deg);
            }
        }

        #aircraftTitle {
                font-size: 3.5rem;
                font-weight: 700;
                letter-spacing: 0.1em;
                background: none;
                color: var(--accent);
                margin: 0;
                font-family: 'Inter', sans-serif;
                animation: none !important;
            }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        /* ==================== LOADING ANIMATION ==================== */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            overflow: hidden;
            transform: scale(0.9);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
            animation: overlayPulse 1.2s ease-in-out infinite;
            transform: scale(1);
        }

        .loading-overlay.active .flying-plane {
            animation: flyingPlane 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .flying-plane {
            font-size: 5rem;
            filter: drop-shadow(0 0 20px rgba(6, 182, 212, 0.5));
            animation: flyingPlane 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            margin-bottom: 2rem;
            z-index: 210;
        }

        @keyframes flyingPlane {
            0% {
                transform: translateX(-150vw) translateY(50px) rotate(-10deg) scale(0.5);
                opacity: 0;
            }

            20% {
                opacity: 1;
                transform: translateX(-100vw) translateY(0) rotate(-5deg) scale(0.8);
            }

            50% {
                transform: translateX(0) translateY(-20px) rotate(0deg) scale(1.1);
            }

            80% {
                opacity: 1;
                transform: translateX(100vw) translateY(0) rotate(5deg) scale(0.8);
            }

            100% {
                transform: translateX(150vw) translateY(50px) rotate(10deg) scale(0.5);
                opacity: 0;
            }
        }

        /* Global Click Animation */
        /* Global Click Animation (disabled) */
        /*
        .click-animation {
            position: fixed;
            border: 2px solid rgba(6, 182, 212, 0.5);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: ripple 0.8s ease-out forwards;
            z-index: 9999;
        }
        */

        @keyframes ripple {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }

            100% {
                width: 150px;
                height: 150px;
                opacity: 0;
            }
        }

        .loading-text {
            color: #06b6d4;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes overlayPulse {
            0%, 100% {
                background: rgba(0, 0, 0, 0.9);
            }
            50% {
                background: rgba(0, 0, 0, 1);
            }
        }

        /* initial flight-info fade animation */
        .fade-in {
            animation: fadeIn 1s ease forwards;
        }

        .fade-out {
            animation: fadeOut 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: translateY(-20px);}
            to {opacity:1; transform: translateY(0);}
        }

        @keyframes fadeOut {
            from {opacity:1;}
            to {opacity:0;}
        }

        @keyframes slideInUp {
            from {opacity:0; transform: translateY(30px);}
            to {opacity:1; transform: translateY(0);}
        }

        /* sliding entrance from right for bigger sections */
        .slide-in-right {
            animation: slideRightIn 0.8s cubic-bezier(0.4,0,0.2,1) forwards;
        }

        @keyframes slideRightIn {
            from {
                opacity: 0;
                transform: translateX(100vw) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        /* slide-out to left when leaving page */
        .slide-out-left {
            animation: slideLeftOut 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
        }

        @keyframes slideLeftOut {
            from {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateX(-100vw) scale(0.9);
            }
        }

        @keyframes rowFade {
            from {opacity:0;}
            to {opacity:1;}
        }

        /* seat click animation */
        @keyframes seatBounce {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(0.9); }
            75% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .seat-animate {
            animation: seatBounce 0.6s ease forwards;
        }

        .row-fade {
            animation: rowFade 0.5s ease forwards;
        }

        .seat-map {
            animation: slideInUp 0.8s ease;
        }

        /* ==================== SEAT MAP CONTAINER ==================== */
        .seat-map-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* make intro/flight-info section take more vertical space and center its contents */
        #introSection {
            min-height: 75vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .flight-info {
            background: rgba(18,18,18,0.6);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .flight-info label.selector-label {
            font-size: 1rem;
        }

        .flight-info .aircraft-select,
        .flight-info input.aircraft-select {
            font-size: 1rem;
            padding: 0.8rem;
        }

        .seat-map-header {
            margin-bottom: 1.5rem;
        }

        .seat-map-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .seat-map-info {
            color: #888;
            font-size: 0.825rem;
            opacity: 0.8;
        }

        .seat-map {
            background: rgba(10, 10, 10, 0.2);
            border-radius: 4rem;
            padding: 6rem 15rem;
            /* Large horizontal padding to make room for wings */
            overflow: visible;
            /* CRITICAL: Prevent wing clipping */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* Aircraft Fuselage Elements */
        .fuselage {
            position: relative;
            background: linear-gradient(to right, #111 0%, #222 20%, #252525 50%, #222 80%, #111 100%);
            border: 2px solid rgba(0, 217, 255, 0.15);
            border-radius: 4rem;
            padding: 3rem 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.9),
                inset 0 0 40px rgba(255, 255, 255, 0.03);
            transition: all 0.5s ease;
            width: fit-content;
            min-width: 150px;
        }

        .fuselage::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(to bottom, transparent 0, transparent 99px, rgba(0, 217, 255, 0.03) 100px);
            pointer-events: none;
            border-radius: 4rem;
        }

        .cockpit {
            width: 120px;
            height: 110px;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a, #1a1a1a);
            border: 2px solid rgba(0, 217, 255, 0.2);
            border-bottom: none;
            border-top-left-radius: 80% 100%;
            /* More pointed nose */
            border-top-right-radius: 80% 100%;
            margin-bottom: -1px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
            transition: all 0.5s ease;
        }

        .cockpit::after {
            content: '';
            position: absolute;
            top: 20px;
            width: 90px;
            height: 35px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 45%, #333 50%, #1a1a1a 55%, #0a0a0a 100%);
            background-size: 200% auto;
            border: 1px solid rgba(0, 217, 255, 0.4);
            border-radius: 45% 45% 10% 10%;
            box-shadow: 0 0 20px rgba(0, 217, 212, 0.15), inset 0 0 10px rgba(0, 0, 0, 0.5);
            animation: glassShine 4s linear infinite;
        }

        @keyframes glassShine {
            to {
                background-position: 200% center;
            }
        }

        .tail {
            width: 100px;
            height: 140px;
            background: linear-gradient(to bottom, #111, #222);
            border: 2px solid rgba(0, 217, 255, 0.2);
            border-top: none;
            border-bottom-left-radius: 40% 100%;
            /* Slimmer tail base */
            border-bottom-right-radius: 40% 100%;
            margin-top: -1px;
            position: relative;
            transition: all 0.5s ease;
        }

        .tail::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 60px;
            background: #1a1a1a;
            border: 1px solid rgba(0, 217, 255, 0.1);
            border-radius: 2px;
        }

        /* wing styles removed - no longer used after user request
        .wing {
            position: absolute;
            width: 250px;
            height: 100px;
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
            border: 1px solid rgba(0, 217, 255, 0.1);
            z-index: -1;
            top: 40%;
            transition: all 0.5s ease;
        }

        .wing-left {
            right: 100%;
            border-right: none;
            border-radius: 100% 0 0 100%;
                transform: skewY(15deg) translateX(-20px);
        }

        .wing-right {
            left: 100%;
            border-left: none;
            border-radius: 0 100% 100% 0;
            transform: skewY(15deg) translateX(20px);
        }
        */

        /* Engines (unused since wings removed)
        .engine {
            position: absolute;
            width: 30px;
            height: 50px;
            background: linear-gradient(to right, #222, #333, #222);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 15px;
            top: 20%;
            z-index: 1;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .engine::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 30px;
            background: #111;
            border-radius: 50%;
            box-shadow: inset 0 0 5px #000;
        }
        */

        /* keep old rules for seat rows, etc. they remain valid */

        /* Tapering Effects */
        .row-taper-1 {
            transform: scaleX(0.85);
            opacity: 0.9;
        }

        .row-taper-2 {
            transform: scaleX(0.92);
        }

        .row-taper-3 {
            transform: scaleX(0.97);
        }

        .seat-rows {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            align-items: center;
        }

        .seat-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.35rem;
            margin-bottom: 0;
        }

        .seat-row-label {
            width: 1.5rem;
            text-align: center;
            color: #666;
            font-size: 0.65rem;
            font-weight: 600;
            margin-right: 0.25rem;
        }

        .seat-aisle-gap {
            width: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .seat-cells {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .seat {
            width: 2.2rem;
            height: 2.2rem;
            border: 1px solid;
            border-radius: 0.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: bold;
            transition: all 0.2s ease;
            position: relative;
        }

        /* Quality Colors - Simplified */
        .seat.excellent {
            background: #1a4d2e;
            border-color: #2d7a4a;
            color: #4ade80;
        }

        .seat.good {
            background: #0f3a52;
            border-color: #1b5e7a;
            color: #06b6d4;
        }

        .seat.standard {
            background: #1a3a52;
            border-color: #2a5a7a;
            color: #8ab4d5;
        }

        .seat.fair {
            background: #5a3d00;
            border-color: #8b5e00;
            color: #fbbf24;
        }

        .seat.poor {
            background: #4a1f1f;
            border-color: #7a2f2f;
            color: #f87171;
        }

        .seat:hover:not(:disabled) {
            transform: scale(1.1);
            opacity: 0.9;
        }

        .seat:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* ==================== LEGEND ==================== */
        .legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.825rem;
            color: #ccc;
        }

        .legend-dot {
            width: 1.25rem;
            height: 1.25rem;
            border: 1px solid;
            border-radius: 0.25rem;
        }

        /* ==================== MODAL ==================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.5rem;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--color-surface);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 0.75rem;
            padding: 1.5rem;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0, 217, 255, 0.1);
            padding-bottom: 1rem;
        }

        .modal-title {
            font-size: 1.25rem;

            'LON-PAR': 214,

        // download and populate airport list for datalist (openflights dataset)
        function loadAirports() {
            const datalist = document.getElementById('airportList');
            if (!datalist) return;
            fetch('https://raw.githubusercontent.com/jpatokal/openflights/master/data/airports.dat')
                .then(resp => resp.text())
                .then(txt => {
                    const lines = txt.split('\n');
                    lines.forEach(line => {
                        if (!line) return;
                        // format: id,name,city,country,iata,icao,lat,long,alt,timezone,dst,tz
                        const parts = line.split(',');
                        if (parts.length < 5) return;
                        const name = parts[1].replace(/"/g, '');
                        const city = parts[2].replace(/"/g, '');
                        const code = parts[4].replace(/"/g, '');
                        if (!code || code === '\\N') return;
                        const lat = parseFloat(parts[6]);
                        const lon = parseFloat(parts[7]);
                        if (!isNaN(lat) && !isNaN(lon)) {
                            airportCoords[code] = { lat, lon };
                        }
                        const opt = document.createElement('option');
                        opt.value = `${code} - ${name} (${city})`;
                        datalist.appendChild(opt);
                    });
                })
                .catch(err => {
                    console.error('Failed to load airports list', err);
                });
        }

        function getDistance(orig, dest) {
            if (!orig || !dest || orig === dest) return 0;
            const key = `${orig}-${dest}`;
            const rev = `${dest}-${orig}`;
            // try to compute using coordinates first
            const oCoords = airportCoords[orig];
            const dCoords = airportCoords[dest];
            if (oCoords && dCoords) {
                return haversine(oCoords.lat, oCoords.lon, dCoords.lat, dCoords.lon);
            }
            // fallback to table if available
            return cityDistances[key] || cityDistances[rev] || 4000;
        }

        // haversine great-circle formula returns miles between two lat/lon points
        function haversine(lat1, lon1, lat2, lon2) {
            const toRad = x => x * Math.PI / 180;
            const R = 3958.8; // radius of Earth in miles
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // return a duration object {h, m} based on computed distance
        function getDuration(orig, dest) {
            if (!orig || !dest || orig === dest) return { h: 0, m: 0 };
            // distance already computed using coords or fallback
            const dist = getDistance(orig, dest);
            // apply a reasonable average cruise speed with a small overhead
            const hoursFloat = dist / 500 + 0.5; // ~500mph + 30min taxi
            const h = Math.floor(hoursFloat);
            const m = Math.round((hoursFloat - h) * 60);
            return { h, m };
        }

        function evaluateFlight() {
            const origVal = document.getElementById('originSelect').value;
            const destVal = document.getElementById('destSelect').value;
            const orig = origVal.split(' ')[0].toUpperCase();
            const dest = destVal.split(' ')[0].toUpperCase();
            selectedOrig = orig;
            selectedDest = dest;
            // no seat preference filters on intro screen now
            seatPreferences = {};
            // compute duration
            const distance = getDistance(orig, dest);
            const { h: hours, m: minutes } = getDuration(orig, dest);
            let advice = `Estimated flight duration: ${hours}h ${minutes}m`;
            const durEl = document.getElementById('durationDisplay');
            if (durEl) durEl.textContent = `≈ ${hours}h ${minutes}m`;
            // determine recommendation text for errors only
            if (!orig || !dest) {
                advice = 'Please choose both an origin and a destination.';
                document.getElementById('flightAdvice').textContent = advice;
                return;
            }
            if (distance === 0) {
                advice = 'Origin and destination cannot be the same. Please pick different airports.';
                document.getElementById('flightAdvice').textContent = advice;
                return;
            } // no further advice adjustments; duration is primary
            document.getElementById('flightAdvice').textContent = advice;
            applyRecommendation(distance);

            // show loading overlay for 1.1 seconds
            const overlay = document.getElementById('loadingOverlay');
            document.querySelector('.loading-text').textContent = 'Analyzing flight...';
            overlay.classList.add('active');

            // fade out flight-info
            const intro = document.querySelector('.flight-info');
            intro.classList.add('fade-out');

            setTimeout(() => {
                // determine available aircraft by range
                availableAircraft = mockAircraft.filter(a => a.range >= distance);
                if (availableAircraft.length === 0) {
                    advice += ' (No aircraft in our database can fly this distance.)';
                    document.getElementById('flightAdvice').textContent = advice;
                }

                // reveal selection section and populate selector
                const selSec = document.getElementById('selectionSection');
                selSec.style.display = 'block';
                selSec.classList.add('slide-in-right');
                document.getElementById('introSection').style.display = 'none';
                const hdr = document.querySelector('.aircraft-header');
                hdr.style.display = 'block';
                hdr.classList.add('fade-in');
                const mapCont = document.querySelector('.seat-map-container');
                mapCont.style.display = 'block';
                mapCont.classList.add('slide-in-right');
                populateAircraftSelector();

                // automatically select first available aircraft so user sees seat map
                if (availableAircraft.length > 0) {
                    currentAircraft = availableAircraft[0];
                    const selector = document.getElementById('aircraftSelect');
                    selector.value = currentAircraft.id;
                    document.getElementById('aircraftTitle').textContent = currentAircraft.name;
                    renderSeatMap();
                }

                // display route text
                const route = document.getElementById('routeDisplay');
                if (route) {
                        // show estimated duration instead of budget
                    const { h: hrs, m: mins } = getDuration(orig, dest);
                        route.textContent = `${origVal} → ${destVal} (${hrs}h ${mins}m)`;
                    route.style.display = 'block';
                    route.style.opacity = '0';
                    route.style.animation = 'fadeIn 0.6s ease forwards';
                }

                overlay.classList.remove('active');
            }, 1100);
        }

    function applyRecommendation(distance) {
            // clear current filter state
            selectedFilters = {};
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));

            // simple distance-based default filtering
            if (distance > 3000) {
                selectedFilters['standard'] = true;
            } else {
                selectedFilters['good'] = true;
            }

            // update pill classes
            document.querySelectorAll('.filter-pill').forEach(p => {
                const key = p.dataset.key;
                if (key && selectedFilters[key]) p.classList.add('active');
            });
            renderSeatMap();
        }

        function renderSeats(container) {
            const filteredSeats = getFilteredSeats();
            const filteredSet = new Set(filteredSeats.map(s => s.id));

            for (let row = 1; row <= currentAircraft.rows; row++) {
                const rowDiv = document.createElement('div');

                // animation class will be toggled later - add delay for cascade

                rowDiv.style.animationDelay = `${row * 0.02}s`;

                // Add tapering classes
                const lastRow = currentAircraft.rows;
                if (row <= 3) rowDiv.classList.add(`row-taper-${row}`);
                else if (row > lastRow - 3) rowDiv.classList.add(`row-taper-${lastRow - row + 1}`);

                const rowLabel = document.createElement('div');
                rowLabel.className = 'seat-row-label';
                rowLabel.textContent = row;
                rowDiv.appendChild(rowLabel);

                const cellsDiv = document.createElement('div');
                cellsDiv.className = 'seat-cells';

                currentAircraft.columns.forEach((col, colIndex) => {
                    const seat = currentAircraft.seats.find(s => s.row === row && s.column === col);
                    const isFiltered = filteredSet.has(seat.id);

                    const seatBtn = document.createElement('button');
                    seatBtn.className = `seat ${seat.quality}`;
                    seatBtn.textContent = '▪';
                    seatBtn.title = `${seat.id}`;
                    seatBtn.id = `seat-${seat.id}`;
                    seatBtn.disabled = !isFiltered;
                    seatBtn.onclick = () => {
                        // animate the button briefly
                        const btn = document.getElementById(`seat-${seat.id}`);
                        if (btn) {

                            btn.addEventListener('animationend', () => {
                                btn.classList.remove('seat-animate');

                    cellsDiv.appendChild(seatBtn);

                        gap.className = 'seat-aisle-gap';
                        gap.textContent = '';
                        cellsDiv.appendChild(gap);
                    }

                rowDiv.appendChild(cellsDiv);
                container.appendChild(rowDiv);
            }

                    ${seat.legroom ? '<div class="feature-item">🦵 Extra legroom</div>' : ''}
                    ${seat.nearToilet ? '<div class="feature-item">🚻 Near toilet</div>' : ''}
                </div>
                <div style="text-align:center; margin-top:1rem;">
                    <a id="bookLink" href="#" target="_blank" class="filter-pill" style="padding:0.75rem 1.5rem;">Book Now!</a>
                </div>
            `;

            // update booking link based on selected origin/dest
            const bookLink = document.getElementById('bookLink');
            if (bookLink && selectedOrig && selectedDest) {
                const o = selectedOrig.toLowerCase();
                const d = selectedDest.toLowerCase();
                let url = `https://www.skyscanner.com/transport/flights/${o}/${d}/`;
                if (selectedMonth) {
                    url += `${selectedMonth}/`;
                    // display month name on button as well
                    const yr = selectedMonth.slice(0,4);
                    const mo = parseInt(selectedMonth.slice(4),10) - 1;
                    const mname = new Date(yr, mo).toLocaleString('default', { month: 'long' });
                    bookLink.textContent = `Book Now! (${mname})`;
                }
                url += `?adults=1`;
                bookLink.href = url;
            }

            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // ==================== EVENT LISTENERS ====================
        function attachEventListeners() {
            document.getElementById('modalClose').onclick = closeModal;
            document.getElementById('modalOverlay').onclick = (e) => {
                if (e.target === document.getElementById('modalOverlay')) closeModal();
            };

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });

            // Global Click Animation Listener
            // global click animation removed per design request (was ripple effect)
            // document.addEventListener('mousedown', (e) => {
            //     const ripple = document.createElement('div');
            //     ripple.className = 'click-animation';
            //     ripple.style.left = `${e.clientX}px`;
            //     ripple.style.top = `${e.clientY}px`;
            //     document.body.appendChild(ripple);
            //
            //     setTimeout(() => {
            //         ripple.remove();
            //     }, 800);
            // });

            // show continue button once both airports are chosen
            const origInput = document.getElementById('originSelect');
            const destInput = document.getElementById('destSelect');
            const continueBtn = document.getElementById('continueBtn');

            function checkContinueVisibility() {
                const o = origInput.value.trim();
                const d = destInput.value.trim();
                // show continue when both airports chosen (even if month not yet)
                if (o && d && o.split(' ')[0].toUpperCase() !== d.split(' ')[0].toUpperCase()) {
                    if (continueBtn) {
                        continueBtn.style.display = 'inline-block';
                        continueBtn.disabled = !selectedMonth;
                        continueBtn.textContent = selectedMonth ? 'Continue' : 'Select month';
                    }
                    // update displayed duration immediately
                    updateIntroDuration(o, d);
                } else {
                    if (continueBtn) continueBtn.style.display = 'none';
                    // clear duration if incomplete or invalid
                    const durEl = document.getElementById('durationDisplay');
                    if (durEl) durEl.textContent = '--';
                }
            }

            [origInput, destInput].forEach(input => {
                if (input) {
                    input.addEventListener('input', () => {
                        checkContinueVisibility();
                    });
                }
            });

            // helper to compute and show duration on intro page
            function updateIntroDuration(origVal, destVal) {
                const orig = origVal.split(' ')[0].toUpperCase();
                const dest = destVal.split(' ')[0].toUpperCase();
                const { h, m } = getDuration(orig, dest);
                const durEl = document.getElementById('durationDisplay');
                if (durEl) durEl.textContent = `≈ ${h}h ${m}m`;
            }

            if (continueBtn) {
                continueBtn.addEventListener('click', () => {
                    evaluateFlight();
                });
            }

            // when month selector changes, re-evaluate button enabled state
            const monthSel = document.getElementById('dateSelect');
            if (monthSel) {
                monthSel.addEventListener('change', () => {
                    selectedMonth = monthSel.value;
                    checkContinueVisibility();
                });
            }

            const changeBtn = document.getElementById('changeFlight');
            if (changeBtn) changeBtn.addEventListener('click', () => {
                // play exit animations on current sections
                const selSec = document.getElementById('selectionSection');
                const hdr = document.querySelector('.aircraft-header');
                const mapCont = document.querySelector('.seat-map-container');
                if (selSec) {
                    selSec.classList.remove('slide-in-right', 'fade-in');
                    selSec.classList.add('slide-out-left');
                }
                if (hdr) {
                    hdr.classList.remove('fade-in');
                    hdr.classList.add('fade-out');
                }
                if (mapCont) {
                    mapCont.classList.remove('slide-in-right', 'fade-in');
                    mapCont.classList.add('slide-out-left');
                }
                // hide continue button when returning to intro
                const continueBtn = document.getElementById('continueBtn');
                if (continueBtn) continueBtn.style.display = 'none';
                // leave month selection alone so user doesn't have to re-pick
                // (if you prefer clearing, uncomment below)
                // const monthSel = document.getElementById('dateSelect');
                // if (monthSel && monthSel.options.length) {
                //     monthSel.selectedIndex = 0;
                //     selectedMonth = '';
                // }

                // after animation finishes, swap back to intro
                setTimeout(() => {
                    selSec.style.display = 'none';
                    hdr.style.display = 'none';
                    mapCont.style.display = 'none';
                    document.getElementById('introSection').style.display = 'block';
                    document.getElementById('flightAdvice').textContent = '';
                    const route = document.getElementById('routeDisplay');
                    if (route) route.style.display = 'none';
                    // reset selectors
                    document.getElementById('originSelect').value = '';
                    document.getElementById('destSelect').value = '';
                    // animate intro back in
                    const intro = document.querySelector('.flight-info');
                    intro.classList.remove('fade-out');
                    intro.classList.add('fade-in');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 600);
            });
        }

        // ==================== START ====================
        init();
    </script>

</body>
